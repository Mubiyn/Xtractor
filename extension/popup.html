<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Extractor</title>
    <link rel="icon" href="icons/icon48.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup">
    <header class="popup-header">
      <img src="icons/icon48.png" width="32" height="32" alt="" class="popup-logo" />
      <h1>Extractor</h1>
    </header>
    <p class="fine extractor-now">Now: <b>X &middot; Bookmarks</b></p>
    <div class="status-row">
      <span class="dot" id="pDot"></span>
      <span id="pText">Checking&hellip;</span>
    </div>
    <button id="exportBtn" class="primary">Export now</button>
    <button id="openBtn" class="secondary">Open full exporter</button>
    <p class="fine">Local-only. No servers, no tracking.</p>
    <script src="popup.js"></script>
  </body>
</html>
