# CI on every push to main.
# Deploy runs when repository variable ENABLE_FIREBASE_DEPLOY=true (and secret is set).
#
# Setup (repo → Settings → Secrets and variables → Actions):
#   Secret:  FIREBASE_SERVICE_ACCOUNT = full service-account JSON from Firebase Console
#   Variable: ENABLE_FIREBASE_DEPLOY = true   (after the secret is added)
#
# See HOSTING.md for step-by-step setup.

name: CI and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build bookmarklet
        run: node build.cjs

      - name: Run tests
        run: npm test

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: ${{ vars.ENABLE_FIREBASE_DEPLOY == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build bookmarklet
        run: node build.cjs

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: xtractor-78c0f
