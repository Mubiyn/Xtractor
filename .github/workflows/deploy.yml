# Deploy the landing page to Firebase Hosting on every push to main.
#
# One-time setup (GitHub repo → Settings → Secrets and variables → Actions):
#   1. Firebase Console → Project settings → Service accounts
#   2. "Generate new private key" → download JSON
#   3. Add secret: FIREBASE_SERVICE_ACCOUNT = entire JSON file contents
#
# See HOSTING.md for full instructions.

name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build bookmarklet
        run: node build.cjs

      - name: Run tests
        run: npm test

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: xtractor-78c0f
