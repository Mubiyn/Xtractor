# CI on every push to main. Deploy only after FIREBASE_SERVICE_ACCOUNT is set.
#
# Required secret (repo → Settings → Secrets and variables → Actions):
#   FIREBASE_SERVICE_ACCOUNT = full JSON from Firebase Console →
#   Project settings → Service accounts → Generate new private key
#
# See HOSTING.md for step-by-step setup.

name: CI and Deploy

on:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build bookmarklet
        run: node build.cjs

      - name: Run tests
        run: npm test

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Build bookmarklet
        run: node build.cjs

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: xtractor-78c0f
